name: Build CV PDFs

on:
  push:
    branches:
      - main
    paths:
      - "**/*.tex"
      - ".github/workflows/build-cvs.yml"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cvs:
    name: Compile all CVs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compile every CV
        uses: xu-cheng/latex-action@v4
        with:
          root_file: "**/main.tex"
          work_in_root_file_dir: true
          continue_on_error: false
          os: debian
          texlive_version: latest

      - name: Commit generated PDFs
        shell: bash
        run: |
          find . -type f -name "main.pdf" -print0 | xargs -0 git add --

          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "build: compile updated CV PDFs"
          git push
